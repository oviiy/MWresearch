<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#080c12;
  font-family:'Segoe UI',system-ui,sans-serif;
  color:#e0e0e0;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  padding:12px 24px;
  background:rgba(0,0,0,.5);
  border-bottom:1px solid #1a2233;
  flex-shrink:0;
  backdrop-filter:blur(8px);
}
.logo{
  font-size:1.1rem;font-weight:800;letter-spacing:2px;
  color:#00d4ff;text-shadow:0 0 20px rgba(0,212,255,.5);
  white-space:nowrap;
}
.controls{display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex:1;}
.ctrl-group{display:flex;align-items:center;gap:8px;}
.ctrl-group label{font-size:.68rem;text-transform:uppercase;letter-spacing:1.2px;color:#556;}
.ctrl-group select, .ctrl-group input[type=range]{
  background:#0d1420;border:1px solid #1e2d3d;border-radius:6px;
  color:#e0e0e0;font-size:.78rem;padding:5px 8px;outline:none;cursor:pointer;
}
.ctrl-group select{padding:5px 10px;}
.ctrl-group input[type=range]{
  accent-color:#00d4ff;width:90px;padding:0;border:none;background:transparent;
}
.val-label{font-size:.78rem;font-weight:700;color:#00d4ff;min-width:26px;}

.btn{
  padding:8px 18px;border:none;border-radius:8px;font-size:.78rem;
  font-weight:700;cursor:pointer;letter-spacing:.4px;text-transform:uppercase;
  transition:all .15s;white-space:nowrap;
}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn-gen  {background:linear-gradient(135deg,#00d4ff,#0088cc);color:#000;}
.btn-solve{background:linear-gradient(135deg,#f0c040,#c8960c);color:#000;}
.btn-auto {background:linear-gradient(135deg,#2ecc71,#1a9955);color:#000;}
.btn-reset{background:#1a2233;color:#556;border:1px solid #1e2d3d;}
.btn-reset:hover{color:#aaa;}

/* ── STATS ── */
.stats{
  display:flex;align-items:center;gap:16px;margin-left:auto;flex-wrap:wrap;
}
.stat{text-align:center;}
.stat-val{font-size:.88rem;font-weight:800;color:#00d4ff;display:block;}
.stat-key{font-size:.55rem;text-transform:uppercase;letter-spacing:1px;color:#334;display:block;}

/* ── CANVAS AREA ── */
.canvas-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:16px;min-height:0;
  position:relative;
}
canvas{
  border-radius:4px;
  box-shadow:0 0 60px rgba(0,212,255,.08),0 20px 60px rgba(0,0,0,.6);
  display:block;
  image-rendering:pixelated;
}

/* ── STATUS BAR ── */
.statusbar{
  flex-shrink:0;padding:7px 24px;
  background:rgba(0,0,0,.4);border-top:1px solid #1a2233;
  display:flex;align-items:center;justify-content:space-between;
}
.status-msg{font-size:.7rem;color:#556;letter-spacing:.5px;}
.status-msg b{color:#00d4ff;}
.legend{display:flex;gap:14px;}
.leg{display:flex;align-items:center;gap:5px;font-size:.62rem;color:#445;}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">◈ MAZE</div>

  <div class="controls">
    <div class="ctrl-group">
      <label>Size</label>
      <select id="sel-size">
        <option value="15,20">Small  15×20</option>
        <option value="25,35" selected>Medium 25×35</option>
        <option value="38,55">Large  38×55</option>
        <option value="55,80">Huge   55×80</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Algorithm</label>
      <select id="sel-algo">
        <option value="dfs">DFS (Backtracker)</option>
        <option value="prim">Prim's (Random)</option>
        <option value="kruskal">Kruskal's</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Speed</label>
      <input type="range" id="sl-speed" min="1" max="100" value="50">
      <span class="val-label" id="speed-val">50</span>
    </div>
    <button class="btn btn-gen"   id="btn-gen"   onclick="startGen()">Generate</button>
    <button class="btn btn-solve" id="btn-solve" onclick="startSolve()" disabled>Solve</button>
    <button class="btn btn-auto"  id="btn-auto"  onclick="startAuto()">Auto ▶</button>
    <button class="btn btn-reset" id="btn-reset" onclick="resetAll()">Reset</button>
  </div>

  <div class="stats">
    <div class="stat"><span class="stat-val" id="s-cells">—</span><span class="stat-key">Cells</span></div>
    <div class="stat"><span class="stat-val" id="s-gentime">—</span><span class="stat-key">Gen Time</span></div>
    <div class="stat"><span class="stat-val" id="s-solvetime">—</span><span class="stat-key">Solve Time</span></div>
    <div class="stat"><span class="stat-val" id="s-pathlen">—</span><span class="stat-key">Path Len</span></div>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="c"></canvas>
</div>

<div class="statusbar">
  <span class="status-msg" id="status-msg">Press <b>Generate</b> to build a maze, or <b>Auto ▶</b> to build and solve automatically.</span>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#1e3a5a"></div>Generating</div>
    <div class="leg"><div class="leg-dot" style="background:#00d4ff"></div>Frontier</div>
    <div class="leg"><div class="leg-dot" style="background:#1a3a6a"></div>Exploring</div>
    <div class="leg"><div class="leg-dot" style="background:#f0c040"></div>Solution</div>
    <div class="leg"><div class="leg-dot" style="background:#00c853"></div>Start</div>
    <div class="leg"><div class="leg-dot" style="background:#ff4444"></div>End</div>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  CONFIG & STATE
// ══════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let ROWS=25, COLS=35;
let grid=[], WALL=2, CS=16;
let phase='idle';   // idle | generating | generated | solving | solved
let RAF=null;
let genSteps=[], solveSteps=[];
let genIdx=0, solveIdx=0;
let genStartTime=0, genEndTime=0, solveStartTime=0, solveEndTime=0;
let autoMode=false;

// Colors
const C = {
  bg:        '#080c12',
  cellEmpty: '#0d1420',
  cellVisit: '#0f2040',
  cellFront: '#00d4ff',
  cellStack: '#0a1a30',
  cellSolve: '#0a2050',
  cellPath:  '#f0c040',
  cellStart: '#00c853',
  cellEnd:   '#ff4444',
  wall:      '#080c12',
  wallEdge:  '#1a2233',
};

// ══════════════════════════════════════
//  GRID
// ══════════════════════════════════════
function makeGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++){
      grid[r][c]={
        r,c,
        walls:{N:true,E:true,S:true,W:true},
        visited:false,
        genOrder:-1,
        solveVisited:false,
        onPath:false,
        isFront:false,
        isStack:false,
        parent:null,
      };
    }
  }
}

function cell(r,c){ return (r>=0&&r<ROWS&&c>=0&&c<COLS)?grid[r][c]:null; }

function neighbors(r,c){
  return [
    {d:'N',nr:r-1,nc:c},
    {d:'E',nr:r,  nc:c+1},
    {d:'S',nr:r+1,nc:c},
    {d:'W',nr:r,  nc:c-1},
  ].filter(n=>cell(n.nr,n.nc));
}

function removeWall(a,b,dir){
  const opp={N:'S',S:'N',E:'W',W:'E'};
  a.walls[dir]=false;
  b.walls[opp[dir]]=false;
}

// ══════════════════════════════════════
//  GENERATION ALGORITHMS
// ══════════════════════════════════════
function buildGenSteps_DFS(){
  const steps=[];
  const stack=[grid[0][0]];
  grid[0][0].visited=true; grid[0][0].genOrder=0;
  let order=1;
  while(stack.length){
    const cur=stack[stack.length-1];
    const unvis=neighbors(cur.r,cur.c)
      .map(n=>({n,cell:grid[n.nr][n.nc]}))
      .filter(({cell})=>!cell.visited);
    if(unvis.length){
      const {n,cell:next}=unvis[Math.floor(Math.random()*unvis.length)];
      removeWall(cur,next,n.d);
      next.visited=true; next.genOrder=order++;
      stack.push(next);
      steps.push({type:'visit',r:next.r,c:next.c,stackDepth:stack.length});
    } else {
      stack.pop();
      steps.push({type:'back',r:cur.r,c:cur.c,stackDepth:stack.length});
    }
  }
  return steps;
}

function buildGenSteps_Prim(){
  const steps=[];
  const frontierSet=[];
  const addFrontier=(r,c)=>{
    const cl=grid[r][c];
    if(!cl.visited){ cl.isFront=true; frontierSet.push(cl); }
  };
  const start=grid[0][0];
  start.visited=true; start.genOrder=0;
  neighbors(0,0).forEach(n=>addFrontier(n.nr,n.nc));
  let order=1;
  while(frontierSet.length){
    const ri=Math.floor(Math.random()*frontierSet.length);
    const front=frontierSet[ri];
    frontierSet.splice(ri,1);
    front.isFront=false;
    if(!front.visited){
      // Pick a visited neighbor and connect
      const vNeighbors=neighbors(front.r,front.c)
        .filter(n=>grid[n.nr][n.nc].visited);
      if(vNeighbors.length){
        const picked=vNeighbors[Math.floor(Math.random()*vNeighbors.length)];
        removeWall(front,grid[picked.nr][picked.nc],picked.d);
        front.visited=true; front.genOrder=order++;
        steps.push({type:'visit',r:front.r,c:front.c,stackDepth:0});
        neighbors(front.r,front.c).forEach(n=>addFrontier(n.nr,n.nc));
      }
    }
  }
  return steps;
}

function buildGenSteps_Kruskal(){
  // Union-Find
  const parent=[];
  const rank=[];
  for(let i=0;i<ROWS*COLS;i++){parent[i]=i;rank[i]=0;}
  const find=x=>{ while(parent[x]!==x){parent[x]=parent[parent[x]];x=parent[x];}return x; };
  const union=(a,b)=>{
    a=find(a);b=find(b);if(a===b)return false;
    if(rank[a]<rank[b]){[a,b]=[b,a];}
    parent[b]=a;if(rank[a]===rank[b])rank[a]++;return true;
  };
  const idx=(r,c)=>r*COLS+c;

  // All horizontal edges (E-W) and vertical edges (N-S)
  const edges=[];
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++){
      if(c+1<COLS) edges.push({r1:r,c1:c,r2:r,c2:c+1,d:'E'});
      if(r+1<ROWS) edges.push({r1:r,c1:c,r2:r+1,c2:c,d:'S'});
    }
  // Shuffle
  for(let i=edges.length-1;i>0;i--){const j=0|Math.random()*(i+1);[edges[i],edges[j]]=[edges[j],edges[i]];}

  const steps=[];
  let order=0;
  for(const e of edges){
    if(union(idx(e.r1,e.c1),idx(e.r2,e.c2))){
      const a=grid[e.r1][e.c1], b=grid[e.r2][e.c2];
      removeWall(a,b,e.d);
      if(!a.visited){a.visited=true;a.genOrder=order++;}
      if(!b.visited){b.visited=true;b.genOrder=order++;}
      steps.push({type:'visit',r:e.r2,c:e.c2,stackDepth:0});
    }
  }
  return steps;
}

// ══════════════════════════════════════
//  SOLVE (BFS)
// ══════════════════════════════════════
function buildSolveSteps(){
  const steps=[];
  const start=grid[0][0];
  const end=grid[ROWS-1][COLS-1];
  const q=[start];
  start.solveVisited=true;
  start.parent=null;

  while(q.length){
    const cur=q.shift();
    steps.push({type:'explore',r:cur.r,c:cur.c});
    if(cur===end) break;

    for(const n of neighbors(cur.r,cur.c)){
      const nb=grid[n.nr][n.nc];
      if(!nb.solveVisited && !cur.walls[n.d]){
        nb.solveVisited=true;
        nb.parent=cur;
        q.push(nb);
      }
    }
  }

  // Trace path
  let node=end;
  const path=[];
  while(node){ path.push(node); node=node.parent; }
  path.reverse();
  path.forEach(p=>steps.push({type:'path',r:p.r,c:p.c}));

  return steps;
}

// ══════════════════════════════════════
//  DRAWING
// ══════════════════════════════════════
function calcLayout(){
  const wrap=document.querySelector('.canvas-wrap');
  const maxW=wrap.clientWidth  - 32;
  const maxH=wrap.clientHeight - 32;
  CS = Math.max(6, Math.min(28, Math.floor(Math.min(maxW/COLS, maxH/ROWS))));
  WALL = Math.max(1, Math.round(CS*0.12));
  canvas.width  = COLS*CS + WALL;
  canvas.height = ROWS*CS + WALL;
}

function draw(){
  ctx.fillStyle=C.wall;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const totalCells=ROWS*COLS;

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cl=grid[r][c];
      const x=c*CS+WALL, y=r*CS+WALL;
      const cw=CS-WALL, ch=CS-WALL;

      // Cell color
      let bg=C.cellEmpty;
      if(cl.onPath)         bg=C.cellPath;
      else if(cl.solveVisited) bg=lerpColor('#0a1e40','#1a3a8a',Math.min(1,cl.genOrder/totalCells*2));
      else if(cl.visited){
        const t=cl.genOrder<0?0:cl.genOrder/totalCells;
        bg=lerpColor('#0d1a2e','#163060',t);
      }

      ctx.fillStyle=bg;
      ctx.fillRect(x,y,cw,ch);

      // Carve passages (draw passage rectangles to fill wall gaps)
      if(!cl.walls.E && c+1<COLS){
        ctx.fillRect(x+cw, y, WALL, ch);
      }
      if(!cl.walls.S && r+1<ROWS){
        ctx.fillRect(x, y+ch, cw, WALL);
      }
      // Fill corner if both E and S passage exist
      if(!cl.walls.E && !cl.walls.S && c+1<COLS && r+1<ROWS){
        ctx.fillRect(x+cw,y+ch,WALL,WALL);
      }
    }
  }

  // Draw frontier glow on top
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cl=grid[r][c];
      if(!cl.isFront&&!cl.isStack) continue;
      const x=c*CS+WALL, y=r*CS+WALL;
      const cw=CS-WALL, ch=CS-WALL;
      ctx.fillStyle=cl.isFront?C.cellFront:'#0a3060';
      ctx.fillRect(x,y,cw,ch);
    }
  }

  // Draw start & end
  drawMarker(0,0,C.cellStart);
  drawMarker(ROWS-1,COLS-1,C.cellEnd);
}

function drawMarker(r,c,color){
  const x=c*CS+WALL, y=r*CS+WALL;
  const cw=CS-WALL;
  ctx.fillStyle=color;
  ctx.fillRect(x,y,cw,cw);
  // Small white dot
  const mx=x+cw/2, my=y+cw/2, mr=Math.max(1,cw*0.22);
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();
}

function lerpColor(hex1,hex2,t){
  const a=hexToRgb(hex1), b=hexToRgb(hex2);
  return `rgb(${~~(a[0]+(b[0]-a[0])*t)},${~~(a[1]+(b[1]-a[1])*t)},${~~(a[2]+(b[2]-a[2])*t)})`;
}
function hexToRgb(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return[r,g,b];
}

// ══════════════════════════════════════
//  ANIMATION
// ══════════════════════════════════════
function getStepsPerFrame(){
  const speed=parseInt(document.getElementById('sl-speed').value);
  // Map 1-100 to 1-2000 steps/frame exponentially
  return Math.max(1, Math.round(Math.pow(speed/100,2.2)*2000));
}

function animateGen(){
  if(phase!=='generating'){ return; }
  const spf=getStepsPerFrame();
  let steps=0;

  while(steps<spf && genIdx<genSteps.length){
    const s=genSteps[genIdx++];
    const cl=grid[s.r][s.c];

    // Clear previous frontier
    if(genIdx>1){
      const prev=genSteps[genIdx-2];
      if(prev) grid[prev.r][prev.c].isFront=false;
    }
    if(s.type==='visit'){ cl.isFront=true; }
    steps++;
  }

  draw();
  updateGenProgress();

  if(genIdx>=genSteps.length){
    genEndTime=performance.now();
    // Clear all frontend flags
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){grid[r][c].isFront=false;grid[r][c].isStack=false;}
    draw();
    phase='generated';
    updateUI();
    setStatus(`Maze generated in <b>${((genEndTime-genStartTime)/1000).toFixed(2)}s</b> — ${ROWS*COLS} cells. Press <b>Solve</b> to find the path.`);
    updateStats();
    if(autoMode){ setTimeout(()=>startSolve(),300); }
    return;
  }
  RAF=requestAnimationFrame(animateGen);
}

function animateSolve(){
  if(phase!=='solving') return;
  const spf=Math.max(1,Math.round(getStepsPerFrame()*0.6));
  let steps=0;

  while(steps<spf && solveIdx<solveSteps.length){
    const s=solveSteps[solveIdx++];
    const cl=grid[s.r][s.c];
    if(s.type==='explore') cl.solveVisited=true;
    if(s.type==='path')    cl.onPath=true;
    steps++;
  }

  draw();

  if(solveIdx>=solveSteps.length){
    solveEndTime=performance.now();
    phase='solved';
    updateUI();
    const pathSteps=solveSteps.filter(s=>s.type==='path').length;
    setStatus(`Path found! Length <b>${pathSteps} cells</b> — solved in <b>${((solveEndTime-solveStartTime)/1000).toFixed(2)}s</b>`);
    updateStats();
    autoMode=false;
    return;
  }
  RAF=requestAnimationFrame(animateSolve);
}

// ══════════════════════════════════════
//  CONTROL FUNCTIONS
// ══════════════════════════════════════
function startGen(){
  cancelAnim();
  autoMode=false;
  readSize();
  makeGrid();
  calcLayout();

  const algo=document.getElementById('sel-algo').value;
  if(algo==='dfs')     genSteps=buildGenSteps_DFS();
  else if(algo==='prim') genSteps=buildGenSteps_Prim();
  else                   genSteps=buildGenSteps_Kruskal();

  genIdx=0;
  phase='generating';
  genStartTime=performance.now();
  updateUI();
  setStatus(`Generating maze using <b>${algoName(algo)}</b> — ${ROWS}×${COLS} grid, ${ROWS*COLS} cells…`);
  document.getElementById('s-cells').textContent=ROWS*COLS;
  draw();
  RAF=requestAnimationFrame(animateGen);
}

function startSolve(){
  if(phase!=='generated'&&phase!=='solved') return;
  cancelAnim();

  // Reset solve state
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    grid[r][c].solveVisited=false;
    grid[r][c].onPath=false;
    grid[r][c].parent=null;
  }
  solveSteps=buildSolveSteps();
  solveIdx=0;
  phase='solving';
  solveStartTime=performance.now();
  updateUI();
  setStatus(`Solving with BFS — exploring paths from start to end…`);
  draw();
  RAF=requestAnimationFrame(animateSolve);
}

function startAuto(){
  cancelAnim();
  autoMode=true;
  startGen();
}

function resetAll(){
  cancelAnim();
  autoMode=false;
  readSize();
  makeGrid();
  calcLayout();
  phase='idle';
  genSteps=[]; solveSteps=[];
  genIdx=0; solveIdx=0;
  updateUI();
  draw();
  setStatus(`Press <b>Generate</b> to build a maze, or <b>Auto ▶</b> to build and solve automatically.`);
  document.getElementById('s-cells').textContent='—';
  document.getElementById('s-gentime').textContent='—';
  document.getElementById('s-solvetime').textContent='—';
  document.getElementById('s-pathlen').textContent='—';
}

function cancelAnim(){
  if(RAF){ cancelAnimationFrame(RAF); RAF=null; }
}

function readSize(){
  const v=document.getElementById('sel-size').value.split(',');
  ROWS=+v[0]; COLS=+v[1];
}

function algoName(a){
  return {dfs:"DFS Backtracker",prim:"Prim's",kruskal:"Kruskal's"}[a]||a;
}

// ══════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════
function updateUI(){
  const gen   = document.getElementById('btn-gen');
  const solve = document.getElementById('btn-solve');
  const auto  = document.getElementById('btn-auto');
  const reset = document.getElementById('btn-reset');

  gen.disabled   = phase==='generating'||phase==='solving';
  auto.disabled  = phase==='generating'||phase==='solving';
  reset.disabled = phase==='generating'||phase==='solving';
  solve.disabled = phase!=='generated'&&phase!=='solved';
}

function setStatus(html){
  document.getElementById('status-msg').innerHTML=html;
}

function updateGenProgress(){
  const pct=Math.round(genIdx/genSteps.length*100);
  setStatus(`Generating… <b>${pct}%</b> complete (${genIdx}/${genSteps.length} steps)`);
}

function updateStats(){
  if(genEndTime>genStartTime)
    document.getElementById('s-gentime').textContent=((genEndTime-genStartTime)/1000).toFixed(2)+'s';
  if(solveEndTime>solveStartTime){
    document.getElementById('s-solvetime').textContent=((solveEndTime-solveStartTime)/1000).toFixed(2)+'s';
    const pl=solveSteps.filter(s=>s.type==='path').length;
    document.getElementById('s-pathlen').textContent=pl;
  }
}

// ══════════════════════════════════════
//  SPEED SLIDER LABEL
// ══════════════════════════════════════
document.getElementById('sl-speed').addEventListener('input',function(){
  document.getElementById('speed-val').textContent=this.value;
});

// ══════════════════════════════════════
//  RESIZE
// ══════════════════════════════════════
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    calcLayout(); draw();
  },120);
});

// ══════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ══════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='g'||e.key==='G') startGen();
  if(e.key==='s'||e.key==='S') startSolve();
  if(e.key==='a'||e.key==='A') startAuto();
  if(e.key==='r'||e.key==='R') resetAll();
});

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
readSize();
makeGrid();
calcLayout();
draw();
updateUI();
</script>
</body>
</html>
